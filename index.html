<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium PMEGP Subsidy Calculator | LoanMitra</title>
    
    <!-- Premium Fonts Baseline -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. DESIGN SYSTEM VARIABLES & RESET
           ========================================== */
        :root {
            --bg-deep: #060b13;
            --primary-gradient: linear-gradient(135deg, #0a192f 0%, #0d1e3d 100%);
            --header-gradient: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.4);
            --text-main: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --error-red: #f43f5e;
            --whatsapp-green: #25d366;

            --glass-bg: rgba(255, 255, 255, 0.96);
            --glass-border: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Ambient Background Matrix */
        .bg-blur-matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            mix-blend-mode: screen;
            opacity: 0.25;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: #1e40af;
            animation-duration: 25s;
        }

        .blob-2 {
            bottom: -15%;
            right: -5%;
            width: 600px;
            height: 600px;
            background: #0d9488;
            animation-duration: 18s;
            animation-delay: 2s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0px, 0px) scale(1); }
            50% { transform: translate(50px, 60px) scale(1.1); }
            100% { transform: translate(-30px, -40px) scale(0.9); }
        }

        /* Main Workspace Container Wrapper */
        .app-shell {
            width: 100%;
            max-width: 1150px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            z-index: 10;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .premium-header {
            background: var(--header-gradient);
            padding: 2.5rem;
            border-bottom: 4px solid var(--accent-green);
            position: relative;
            overflow: hidden;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.7rem;
        }

        .brand-icon-geometric {
            width: 12px;
            height: 28px;
            background: var(--accent-green);
            border-radius: 4px;
            box-shadow: 0 0 15px var(--accent-green-glow);
        }

        .brand-txt {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .premium-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .premium-header p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 0.25rem;
        }

        .workspace-grid {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            background: #ffffff;
        }

        .calculator-block {
            padding: 3rem;
            border-right: 1px solid #e2e8f0;
        }

        /* ==========================================
           2. FORM FIELDS & ARCHITECTURE
           ========================================== */
        .form-layout-matrix {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.75rem;
        }

        .span-full {
            grid-column: span 2;
        }

        .interactive-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            position: relative;
        }

        .interactive-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .interactive-group label .required-node {
            color: var(--error-red);
        }

        .field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field-icon {
            position: absolute;
            left: 1.2rem;
            color: #94a3b8;
            width: 20px;
            height: 20px;
            pointer-events: none;
            transition: var(--transition-smooth);
        }

        .interactive-group input, 
        .interactive-group select {
            width: 100%;
            padding: 1.1rem 1.2rem 1.1rem 3.2rem;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            outline: none;
            transition: var(--transition-smooth);
        }

        .interactive-group select {
            padding-left: 1.5rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' fill='none' viewBox='0 0 24 24' stroke='%2364748b'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 16px;
        }

        .interactive-group input:focus,
        .interactive-group select:focus {
            background: #ffffff;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 5px rgba(30, 58, 138, 0.15);
        }

        .interactive-group input:focus + .field-icon {
            color: #1e3a8a;
        }

        .ui-validation-alert {
            color: var(--error-red);
            font-size: 0.8rem;
            font-weight: 500;
            margin-top: 0.2rem;
            display: none;
            animation: nodeFade 0.3s ease forwards;
        }

        .interactive-group.alert-active input {
            border-color: var(--error-red) !important;
            background: #fff5f5 !important;
        }

        .category-info-panel {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-md);
            padding: 1.2rem;
            margin-top: -0.5rem;
            display: flex;
            gap: 0.75rem;
        }

        .category-info-panel svg {
            width: 22px;
            height: 22px;
            color: var(--accent-green);
            flex-shrink: 0;
        }

        .category-info-panel p {
            font-size: 0.82rem;
            color: #14532d;
            line-height: 1.6;
        }

        .action-button-layer {
            margin-top: 2rem;
        }

        .btn-core-execution {
            width: 100%;
            padding: 1.2rem;
            background: var(--text-dark);
            color: var(--text-main);
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
            transition: var(--transition-smooth);
        }

        .btn-core-execution:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.25);
        }

        .vector-loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spinVector 0.8s linear infinite;
            display: none;
        }

        @keyframes spinVector {
            to { transform: rotate(360deg); }
        }

        /* ==========================================
           3. ANALYTICS & SIDE OUTPUT PANELS
           ========================================== */
        .analytics-block {
            padding: 3rem;
            background: #f8fafc;
            display: flex;
