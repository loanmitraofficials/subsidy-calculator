<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMEGP Subsidy Calculator | LoanMitra</title>
    
    <!-- Google Fonts Baseline -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           1. DESIGN SYSTEM VARIABLES & BRAND RESET
           ========================================== */
        :root {
            --bg-deep: #0a192f;
            --card-bg: #ffffff;
            --primary: #0f172a;
            --accent-green: #10b981;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --error-red: #ef4444;
            --whatsapp-green: #25d366;
            
            --radius-card: 24px;
            --radius-input: 14px;
            --shadow-premium: 0 25px 60px -15px rgba(0, 0, 0, 0.4);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e3a8a, var(--bg-deep) 60%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        /* ==========================================
           2. MAIN APP SHELL STYLING
           ========================================== */
        .calculator-card {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-premium);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.7);
            animation: cardAppear 0.5s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Brand Header Block */
        .brand-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--accent-green);
        }

        .brand-logo-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .logo-indicator {
            width: 10px;
            height: 24px;
            background: var(--accent-green);
            border-radius: 3px;
        }

        .brand-title-text {
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .brand-header h1 {
            color: #ffffff;
            font-size: 1.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        /* Form Controls Wrapper */
        .form-body {
            padding: 2.5rem 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .span-2 {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label .req {
            color: var(--error-red);
        }

        /* Input Element Styling Matrix */
        .form-group input, 
        .form-group select {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-input);
            outline: none;
            transition: var(--transition-smooth);
        }

        .form-group input:focus, 
        .form-group select:focus {
            background: #ffffff;
            border-color: #1e3a8a;
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.1);
        }

        /* Form Field Validation Error Styling */
        .form-group.has-error input {
            border-color: var(--error-red) !important;
            background: #fff5f5 !important;
        }

        .error-lbl {
            color: var(--error-red);
            font-size: 0.78rem;
            font-weight: 500;
            display: none;
            animation: fieldFade 0.3s ease;
        }

        @keyframes fieldFade {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Category Information Box */
        .info-panel {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-input);
            padding: 1rem;
            margin-top: -0.25rem;
        }

        .info-panel p {
            font-size: 0.8rem;
            color: #14532d;
            line-height: 1.5;
        }

        /* Compute Primary Execution Button */
        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: var(--primary);
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-input);
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.15);
            transition: var(--transition-smooth);
        }

        .btn-submit:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.25);
        }

        /* ==========================================
           3. OUTPUT COMPONENT MODULES
           ========================================== */
        .output-wrapper {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px dashed #e2e8f0;
            display: none;
            animation: cardAppear 0.4s ease-out forwards;
        }

        .results-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-card);
            padding: 1.75rem;
            text-align: center;
        }

        .results-box h2 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        .percentage-badge {
            display: inline-block;
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--accent-green);
            background: rgba(16, 185, 129, 0.08);
            padding: 0.25rem 2rem;
            border-radius: 50px;
            border: 1px solid rgba(16, 185, 129, 0.15);
            margin-bottom: 1.5rem;
        }

        .ledger-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .ledger-item:last-of-type {
            border-bottom: none;
            margin-top: 0.5rem;
            background: #ffffff;
            padding: 1rem;
            border-radius: var(--radius-input);
            border: 1px solid #e2e8f0;
        }

        .ledger-lbl {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .ledger-val {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }

        .ledger-item:last-of-type .ledger-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        /* Premium WhatsApp Dispatcher Button */
        .btn-whatsapp {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            padding: 1.1rem;
            background: var(--whatsapp-green);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: var(--radius-input);
            margin-top: 1.5rem;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.2);
            transition: var(--transition-smooth);
        }

        .btn-whatsapp:hover {
            background: #20ba5a;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 211, 102, 0.35);
        }

        /* Responsive Matrix Breakpoint */
        @media (max-width: 520px) {
            .form-grid { grid-template-columns: 1fr; }
            .span-2 { grid-column: span 1; }
            .brand-header h1 { font-size: 1.4rem; }
            .form-body { padding: 1.5rem 1.25rem; }
        }
    </style>
</head>
<body>

    <main class="calculator-card">
        <!-- Application Branding Header -->
        <header class="brand-header">
            <div class="brand-logo-badge">
                <div class="logo-indicator"></div>
                <div class="brand-title-text">LoanMitra</div>
            </div>
            <h1>PMEGP Subsidy Calculator</h1>
        </header>

        <section class="form-body">
            <form id="subsidyCalculationForm" novalidate>
                <div class="form-grid">
